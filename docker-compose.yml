version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana

  # Shared store for distributed rate limiting across cluster workers/instances.
  # Run: docker-compose up -d redis  then  REDIS_URL=redis://localhost:6379 npm run start:cluster
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  grafana-storage: